services:
  postgres:
    image: postgres:16-alpine
    container_name: streakstudy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streakstudy_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-streakstudy_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - streakstudy-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streakstudy-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-streakstudy_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JPA_DDL: update
      JPA_SHOW_SQL: "false"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-must-be-at-least-256-bits-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - streakstudy-net

volumes:
  postgres_data:
    name: streakstudy_postgres_data

networks:
  streakstudy-net:
    name: streakstudy-net
    driver: bridge
