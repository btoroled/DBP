# Configuracion exclusiva para tests (@DataJpaTest, @SpringBootTest)
# H2 en memoria con modo de compatibilidad PostgreSQL.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT de pruebas (>= 32 chars)
app.security.jwt.secret=test-secret-test-secret-test-secret-test-secret
app.security.jwt.expiration-ms=60000
app.security.jwt.refresh-expiration-ms=120000
