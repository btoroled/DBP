# ── Aplicacion ──────────────────────────────────────────
spring.application.name=StreakStudy API

# ── Puerto del servidor ─────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Base de datos (externalizada via variables de entorno) ─
# Defaults pensados para desarrollo local con docker compose en localhost:5432.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/streakstudy_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Pool de conexiones (Hikari) ─────────────────────────
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Actuator (health checks) ────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# ── JWT (para AUTH-xxx en tareas futuras) ───────────────
app.security.jwt.secret=${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# ── AI (Anthropic) ──────────────────────────────────────
app.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}

# ── Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Mail (SMTP, Issue #1) ───────────────────────────────
# Por defecto app.mail.enabled=false: el adapter loguea [MAIL-DISABLED]
# y no abre conexion SMTP. Util para dev/CI/tests sin servidor real.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:no-reply@streakstudy.com}
app.mail.enabled=${MAIL_ENABLED:false}

# ── Thymeleaf (plantillas de email HTML) ────────────────
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
