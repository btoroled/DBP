# ── Aplicacion ──────────────────────────────────────────
spring.application.name=StreakStudy API

# ── Puerto del servidor ─────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Base de datos (externalizada via variables de entorno) ─
# Defaults pensados para desarrollo local con docker compose en localhost:5432.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/streakstudy_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Pool de conexiones (Hikari) ─────────────────────────
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Actuator (health checks) ────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# ── JWT (para AUTH-xxx en tareas futuras) ───────────────
app.security.jwt.secret=${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ── AI (Anthropic) ──────────────────────────────────────
app.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}

# ── Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
