AWSTemplateFormatVersion: "2010-09-09"
Description: "OpenStore: 2 App Servers detrás de ALB, 1 DB Server y bucket S3 "

Parameters:
  InstanceName:
    Type: String
    Default: "MV-OpenShop"
    Description: "Maquina Virtual 1"
  AMI:
    Type: String
    Default: "ami-08d434e92c0cfa0c0"
    Description: "ID de AMI"
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: "vockey"
    Description: "KeyPair para acceso SSH (opcional)"
  InstanceType:
    Type: String
    Default: "t3.medium"
    AllowedValues:
      - "t2.micro"
      - "t3.micro"
      - "t3.small"
      - "t3.medium"
    Description: "Tipo de instancia para App Servers"
  DbInstanceType:
    Type: String
    Default: "t3.medium"
    AllowedValues:
      - "t3.micro"
      - "t3.small"
      - "t3.medium"
      - "t3.large"
    Description: "Tipo de instancia para DB Server"
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC donde desplegar los recursos"
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: "Subnet pública 1 (para ALB y EC2 con IP pública)"
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: "Subnet pública 2 (para ALB y EC2 con IP pública)"
  FrontendRepoUrl:
    Type: String
    Default: "https://github.com/Lazheart/OpenStore"
    Description: "Repositorio Git para Amplify (publico o privado)"
  FrontendBranchName:
    Type: String
    Default: "main"
    Description: "Branch del repositorio a desplegar en Amplify"
  FrontendAmplifyAppName:
    Type: String
    Default: "openstore-frontend"
    Description: "Nombre de la app de Amplify"
  FrontendAmplifyAccessToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Token de GitHub (opcional para repos publicos, recomendado para privados)"

Conditions:
  HasFrontendAmplifyAccessToken: !Not [!Equals [!Ref FrontendAmplifyAccessToken, ""]]

Resources:
  LoadBalancerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "ALB: permitir HTTP y puertos convencionales desde internet"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 8080
          ToPort: 8080
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 3000
          ToPort: 3000
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 8000
          ToPort: 8000
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 8004
          ToPort: 8004
          CidrIp: "0.0.0.0/0"

  AppServerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "App Servers: HTTP de servicios convencionales solo desde ALB, SSH opcional"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 8004
          ToPort: 8004
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 8004
          ToPort: 8004
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"

  DbServerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "DB Server: PostgreSQL/MySQL/Mongo accesibles publicamente (segun requerimiento)"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 5432
          ToPort: 5432
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 27017
          ToPort: 27017
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 3307
          ToPort: 3307
          CidrIp: "0.0.0.0/0"

  ApplicationLoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: !Sub "openstore-alb-${AWS::StackName}"
      Scheme: "internet-facing"
      Type: "application"
      IpAddressType: "ipv4"
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  HttpApi:
    Type: "AWS::ApiGatewayV2::Api"
    Properties:
      Name: !Sub "openstore-http-api-${AWS::StackName}"
      ProtocolType: "HTTP"
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        AllowHeaders:
          - "*"

  HttpApiIntegration:
    Type: "AWS::ApiGatewayV2::Integration"
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: "HTTP_PROXY"
      IntegrationMethod: "ANY"
      IntegrationUri: !Sub "http://${ApplicationLoadBalancer.DNSName}"
      PayloadFormatVersion: "1.0"

  HttpApiProxyIntegration:
    Type: "AWS::ApiGatewayV2::Integration"
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: "HTTP_PROXY"
      IntegrationMethod: "ANY"
      IntegrationUri: !Sub "http://${ApplicationLoadBalancer.DNSName}/{proxy}"
      PayloadFormatVersion: "1.0"

  HttpApiRootRoute:
    Type: "AWS::ApiGatewayV2::Route"
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiProxyRoute:
    Type: "AWS::ApiGatewayV2::Route"
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /{proxy+}"
      Target: !Sub "integrations/${HttpApiProxyIntegration}"

  HttpApiStage:
    Type: "AWS::ApiGatewayV2::Stage"
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true


  StoreTargetGroup:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      Name: "os-store-tg"
      VpcId: !Ref VpcId
      Protocol: "HTTP"
      Port: 8004
      TargetType: "instance"
      HealthCheckProtocol: "HTTP"
      HealthCheckPort: "traffic-port"
      HealthCheckPath: "/health"
      Matcher:
        HttpCode: "200-399"
      Targets:
        - Id: !Ref AppServer1
          Port: 8004
        - Id: !Ref AppServer2
          Port: 8004

  HttpListener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: "HTTP"
      DefaultActions:
        - Type: "forward"
          TargetGroupArn: !Ref StoreTargetGroup


  AppServer1:
    Type: "AWS::EC2::Instance"
    DependsOn: DbServer
    Properties:
      Tags:
        - Key: "Name"
          Value: !Sub "${InstanceName}-App-1"
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: "LabInstanceProfile"
      SecurityGroupIds:
        - !Ref AppServerSecurityGroup
      SubnetId: !Ref PublicSubnet1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: "30"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/user-data.log 2>&1
          cd /home/ubuntu
          git clone https://github.com/Lazheart/OpenStore
          cd OpenStore
          sudo rm -rf frontend
          sudo rm -rf database
          cd ..

  AppServer2:
    Type: "AWS::EC2::Instance"
    DependsOn: DbServer
    Properties:
      Tags:
        - Key: "Name"
          Value: !Sub "${InstanceName}-App-2"
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: "LabInstanceProfile"
      SecurityGroupIds:
        - !Ref AppServerSecurityGroup
      SubnetId: !Ref PublicSubnet2
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: "30"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/user-data.log 2>&1
          cd /home/ubuntu
          git clone https://github.com/Lazheart/OpenStore
          cd OpenStore
          sudo rm -rf frontend
          sudo rm -rf database
          cd ..


  DbServer:
    Type: "AWS::EC2::Instance"
    Properties:
      Tags:
        - Key: "Name"
          Value: !Sub "${InstanceName}-DB"
      ImageId: !Ref AMI
      InstanceType: !Ref DbInstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: "LabInstanceProfile"
      SecurityGroupIds:
        - !Ref DbServerSecurityGroup
      SubnetId: !Ref PublicSubnet1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: "30"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          cd /home/ubuntu
          git clone https://github.com/Lazheart/OpenStore
          cd OpenStore
          sudo rm -rf frontend
          sudo rm -rf backend
          cd database
          sudo cp .env.example .env
          docker compose up -d
          cd ..

  ImagesBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: !Sub "openstore-products-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  ProfilePictureBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: !Sub "openstore-profile-pictures-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  FrontendAmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref FrontendAmplifyAppName
      Repository: !Ref FrontendRepoUrl
      AccessToken: !If [HasFrontendAmplifyAccessToken, !Ref FrontendAmplifyAccessToken, !Ref AWS::NoValue]
      BuildSpec: |
        version: 1
        applications:
          - appRoot: frontend
            frontend:
              phases:
                preBuild:
                  commands:
                    - corepack enable
                    - pnpm install --frozen-lockfile
                build:
                  commands:
                    - pnpm run build
              artifacts:
                baseDirectory: dist
                files:
                  - '**/*'
              cache:
                paths:
                  - node_modules/**/*
      EnvironmentVariables:
        - Name: LOAD_BALANCER_API
          Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
        - Name: VITE_LOAD_BALANCER_API
          Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
        - Name: AMPLIFY_MONOREPO_APP_ROOT
          Value: "frontend"
      CustomRules:
        - Source: "/<*>"
          Target: "/index.html"
          Status: "404-200"

  FrontendAmplifyBranch:
    Type: "AWS::Amplify::Branch"
    DependsOn: ApplicationLoadBalancer
    Properties:
      AppId: !GetAtt FrontendAmplifyApp.AppId
      BranchName: !Ref FrontendBranchName
      EnableAutoBuild: true
      Stage: PRODUCTION
      EnvironmentVariables:
        - Name: LOAD_BALANCER_API
          Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
        - Name: VITE_LOAD_BALANCER_API
          Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
        - Name: AMPLIFY_MONOREPO_APP_ROOT
          Value: "frontend"

Outputs:
  LoadBalancerDNS:
    Description: "DNS del Application Load Balancer"
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  AppServer1PublicIP:
    Description: "IP publica del App Server 1"
    Value: !GetAtt AppServer1.PublicIp
  AppServer2PublicIP:
    Description: "IP publica del App Server 2"
    Value: !GetAtt AppServer2.PublicIp
  DbServerPublicIP:
    Description: "IP publica del DB Server"
    Value: !GetAtt DbServer.PublicIp
  ImagesBucketName:
    Description: "Nombre del bucket S3"
    Value: !Ref ImagesBucket
  FrontendAmplifyAppId:
    Description: "AppId de Amplify para frontend"
    Value: !GetAtt FrontendAmplifyApp.AppId
  FrontendAmplifyDefaultDomain:
    Description: "Dominio base de Amplify"
    Value: !GetAtt FrontendAmplifyApp.DefaultDomain
  FrontendAmplifyURL:
    Description: "URL publica del frontend en Amplify"
    Value: !Sub "https://${FrontendBranchName}.${FrontendAmplifyApp.DefaultDomain}"
  HttpApiEndpoint:
    Description: "Endpoint HTTPS del API Gateway"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
